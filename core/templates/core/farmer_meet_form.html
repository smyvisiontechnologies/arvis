{% extends "core/base.html" %}

{% block content %}
<div style="padding:24px;">
    <div style="background:white;border-radius:22px;padding:24px;box-shadow:0 10px 30px rgba(15,23,42,.08);">
        <h2>{{ title }}</h2>

        <form method="post">
            {% csrf_token %}

            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;">
                {% for field in form %}
                    <div>
                        <label style="font-weight:700;">{{ field.label }}</label>
                        {{ field }}
                        <div style="color:#dc2626;">{{ field.errors }}</div>
                    </div>
                {% endfor %}
            </div>

            <button style="margin-top:20px;background:#16a34a;color:white;border:0;padding:12px 18px;border-radius:12px;font-weight:700;">
                Submit Request
            </button>
        </form>
    </div>
</div>
{% endblock %}
