{% extends "core/base.html" %}
{% block content %}

<style>
.asset-page {
    padding: 18px;
}

.asset-card {
    max-width: 950px;
    margin: 0 auto;
    background: white;
    border-radius: 24px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 14px 34px rgba(15, 23, 42, 0.10);
    padding: 18px;
}

.asset-head {
    background: linear-gradient(135deg, #0f172a, #2563eb);
    color: white;
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 16px;
}

.asset-head h2 {
    margin: 0;
    font-size: 24px;
    font-weight: 900;
}

.asset-head p {
    margin: 7px 0 0;
    color: #dbeafe;
    font-weight: 800;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
}

.form-group label {
    display: block;
    font-size: 12px;
    font-weight: 900;
    color: #334155;
    margin-bottom: 6px;
}

.form-control {
    width: 100%;
    border: 1px solid #cbd5e1;
    background: #f8fafc;
    border-radius: 14px;
    padding: 12px;
    font-weight: 800;
    outline: none;
}

.camera-box {
    margin-top: 16px;
    background: #f8fafc;
    border: 1px dashed #94a3b8;
    border-radius: 22px;
    padding: 14px;
}

video,
canvas,
.preview-img {
    width: 100%;
    max-height: 420px;
    object-fit: contain;
    border-radius: 18px;
    background: #0f172a;
}

.camera-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
}

.btn {
    border: none;
    border-radius: 14px;
    padding: 12px 16px;
    font-weight: 900;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    justify-content: center;
    align-items: center;
}

.btn-dark {
    background: #0f172a;
    color: white;
}

.btn-blue {
    background: #2563eb;
    color: white;
}

.btn-green {
    background: #059669;
    color: white;
}

.btn-light {
    background: #f1f5f9;
    color: #0f172a;
    border: 1px solid #e2e8f0;
}

.note {
    margin-top: 10px;
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    color: #1d4ed8;
    border-radius: 15px;
    padding: 11px;
    font-size: 13px;
    font-weight: 800;
}

@media(max-width: 700px) {
    .asset-page {
        padding: 10px;
    }

    .asset-card {
        padding: 12px;
        border-radius: 20px;
    }

    .grid {
        grid-template-columns: 1fr;
    }

    .asset-head h2 {
        font-size: 20px;
    }

    .camera-actions {
        display: grid;
        grid-template-columns: 1fr;
    }

    .btn {
        width: 100%;
    }
}
</style>

<div class="asset-page">
    <div class="asset-card">
        <div class="asset-head">
            <h2>Assign Asset</h2>
            <p>{{ asset.asset_code }} — {{ asset.name }}</p>
        </div>

        <form method="post" id="assignForm">
            {% csrf_token %}

            <div class="grid">
                <div class="form-group">
                    <label>Asset Code</label>
                    <input type="text" value="{{ asset.asset_code }}" class="form-control" readonly>
                </div>

                <div class="form-group">
                    <label>Asset Name</label>
                    <input type="text" value="{{ asset.name }}" class="form-control" readonly>
                </div>

                <div class="form-group">
                    <label>Employee</label>
                    <select name="employee" class="form-control" required>
                        <option value="">Select Employee</option>
                        {% for employee in employees %}
                            <option value="{{ employee.id }}">
                                {{ employee.get_full_name|default:employee.username }}
                                {% if employee.profile %}
                                    - {{ employee.profile.get_role_display }}
                                {% endif %}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Handover Note</label>
                    <input type="text" name="handover_note" class="form-control" placeholder="Example: Given with charger / good condition">
                </div>
            </div>

            <input type="hidden" name="camera_image_data" id="cameraImageData">

            <div class="camera-box">
                <label style="font-weight:900;color:#0f172a;">Capture Asset Photo</label>

                <video id="cameraVideo" autoplay playsinline></video>
                <canvas id="cameraCanvas" style="display:none;"></canvas>
                <img id="previewImage" class="preview-img" style="display:none;" alt="Captured Preview">

                <div class="camera-actions">
                    <button type="button" class="btn btn-dark" onclick="startCamera()">Open Camera</button>
                    <button type="button" class="btn btn-blue" onclick="capturePhoto()">Capture Photo</button>
                    <button type="button" class="btn btn-light" onclick="retakePhoto()">Retake</button>
                </div>

                <div class="note">
                    Camera photo is compulsory. Direct gallery upload is not allowed.
                </div>
            </div>

            <div class="camera-actions">
                <button type="submit" class="btn btn-green" id="submitBtn" disabled>
                    Assign Asset
                </button>

                <a href="{% url 'asset_list' %}" class="btn btn-light">
                    Back
                </a>
            </div>
        </form>
    </div>
</div>

<script>
let stream = null;

async function startCamera() {
    const video = document.getElementById("cameraVideo");

    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: { ideal: "environment" }
            },
            audio: false
        });

        video.srcObject = stream;
        video.style.display = "block";

        document.getElementById("previewImage").style.display = "none";
        document.getElementById("submitBtn").disabled = true;
        document.getElementById("cameraImageData").value = "";
    } catch (error) {
        alert("Camera not available or permission denied. Please allow camera access.");
    }
}

function capturePhoto() {
    const video = document.getElementById("cameraVideo");
    const canvas = document.getElementById("cameraCanvas");
    const preview = document.getElementById("previewImage");
    const hiddenInput = document.getElementById("cameraImageData");

    if (!video.srcObject) {
        alert("Please open camera first.");
        return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = canvas.toDataURL("image/jpeg", 0.85);

    hiddenInput.value = imageData;
    preview.src = imageData;

    video.style.display = "none";
    preview.style.display = "block";

    document.getElementById("submitBtn").disabled = false;

    if (stream) {
        stream.getTracks().forEach(track => track.stop());
    }
}

function retakePhoto() {
    document.getElementById("cameraImageData").value = "";
    document.getElementById("submitBtn").disabled = true;
    startCamera();
}

document.getElementById("assignForm").addEventListener("submit", function (event) {
    const imageData = document.getElementById("cameraImageData").value;

    if (!imageData) {
        event.preventDefault();
        alert("Please capture asset photo before assigning.");
    }
});
</script>

{% endblock %}
