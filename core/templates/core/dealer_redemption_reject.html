{% extends "core/base.html" %}
{% block content %}

<div style="padding:18px;">
    <div style="max-width:700px;margin:auto;background:white;border:1px solid #e2e8f0;border-radius:22px;padding:18px;">
        <h2 style="margin-top:0;">Reject Redemption Request</h2>

        <p>
            Dealer: <b>{{ redemption.dealer.firm_name }}</b><br>
            Points: <b>{{ redemption.points_requested }}</b>
        </p>

        <form method="post">
            {% csrf_token %}

            <label style="font-weight:900;">Rejection Reason</label>
            <textarea name="reason" class="form-control" rows="4" required></textarea>

            <div style="margin-top:14px;">
                <button type="submit" style="background:#dc2626;color:white;border:0;border-radius:14px;padding:12px 16px;font-weight:900;">
                    Reject
                </button>

                <a href="{% url 'dealer_redemption_approvals' %}" style="background:#f1f5f9;color:#0f172a;border-radius:14px;padding:12px 16px;text-decoration:none;font-weight:900;">
                    Back
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
