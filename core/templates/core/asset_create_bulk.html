{% extends "core/base.html" %}
{% block content %}

<style>
.asset-page {
    padding: 18px;
}

.asset-card {
    max-width: 1050px;
    margin: 0 auto;
    background: white;
    border-radius: 24px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 14px 34px rgba(15, 23, 42, 0.10);
    padding: 18px;
}

.asset-head {
    background: linear-gradient(135deg, #0f172a, #059669);
    color: white;
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 16px;
}

.asset-head h2 {
    margin: 0;
    font-size: 24px;
    font-weight: 900;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
}

.form-group label {
    display: block;
    font-size: 12px;
    font-weight: 900;
    color: #334155;
    margin-bottom: 6px;
}

.form-control {
    width: 100%;
    border: 1px solid #cbd5e1;
    background: #f8fafc;
    border-radius: 14px;
    padding: 12px;
    font-weight: 800;
    outline: none;
}

.full {
    grid-column: 1 / -1;
}

.btn-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
}

.btn {
    border: none;
    border-radius: 14px;
    padding: 12px 16px;
    font-weight: 900;
    text-decoration: none;
    cursor: pointer;
}

.btn-green {
    background: #059669;
    color: white;
}

.btn-light {
    background: #f1f5f9;
    color: #0f172a;
    border: 1px solid #e2e8f0;
}

.note {
    margin: 14px 0;
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    color: #1d4ed8;
    border-radius: 15px;
    padding: 12px;
    font-size: 13px;
    font-weight: 800;
}

@media(max-width: 850px) {
    .grid {
        grid-template-columns: 1fr;
    }

    .asset-page {
        padding: 10px;
    }

    .asset-card {
        padding: 12px;
        border-radius: 20px;
    }

    .btn-row {
        display: grid;
        grid-template-columns: 1fr;
    }

    .btn {
        width: 100%;
        text-align: center;
    }
}
</style>

<div class="asset-page">
    <div class="asset-card">
        <div class="asset-head">
            <h2>Create Assets</h2>
            <p>Example: Laptop quantity 5 creates 5 unique asset codes automatically.</p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="note">
                Select existing category or create new category using name and prefix.
                Example: Laptop + LAP creates LAP-0001, LAP-0002...
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>Existing Category</label>
                    <select name="category" class="form-control">
                        <option value="">Select Category</option>
                        {% for category in categories %}
                            <option value="{{ category.id }}">
                                {{ category.name }} ({{ category.code_prefix }})
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>New Category Name</label>
                    <input type="text" name="new_category_name" class="form-control" placeholder="Example: Laptop">
                </div>

                <div class="form-group">
                    <label>New Category Prefix</label>
                    <input type="text" name="new_category_prefix" class="form-control" placeholder="Example: LAP">
                </div>

                <div class="form-group">
                    <label>Asset Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Example: Dell Laptop" required>
                </div>

                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" name="quantity" min="1" max="500" value="1" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Brand</label>
                    <input type="text" name="brand" class="form-control" placeholder="Example: Dell / Samsung">
                </div>

                <div class="form-group">
                    <label>Model Number</label>
                    <input type="text" name="model_number" class="form-control">
                </div>

                <div class="form-group">
                    <label>Serial Number</label>
                    <input type="text" name="serial_number" class="form-control" placeholder="Only for single asset">
                </div>

                <div class="form-group">
                    <label>Purchase Date</label>
                    <input type="date" name="purchase_date" class="form-control">
                </div>

                <div class="form-group">
                    <label>Purchase Value</label>
                    <input type="number" step="0.01" name="purchase_value" class="form-control">
                </div>

                <div class="form-group full">
                    <label>Description</label>
                    <textarea name="description" rows="4" class="form-control" placeholder="Asset details, accessories, notes..."></textarea>
                </div>
            </div>

            <div class="btn-row">
                <button type="submit" class="btn btn-green">Create Assets</button>
                <a href="{% url 'asset_list' %}" class="btn btn-light">Back</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
